apiVersion: v1
kind: Template
metadata:
  name: sources-mcp
objects:
- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: sources-mcp
  spec:
    envName: ${ENV_NAME}
    deployments:
    - name: svc
      minReplicas: ${{MIN_REPLICAS}}
      webServices:
        private:
          enabled: true
      podSpec:
        image: ${IMAGE}:${IMAGE_TAG}
        env:
        - name: LOG_LEVEL
          value: ${LOG_LEVEL}
        - name: SOURCES_API_URL
          value: http://sources-api-svc:8000
        - name: PORT
          value: "8080"
        - name: METRICS_PORT
          value: "9000"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          limits:
            cpu: ${CPU_LIMIT}
            memory: ${MEMORY_LIMIT}
          requests:
            cpu: ${CPU_REQUEST}
            memory: ${MEMORY_REQUEST}
parameters:
- description: Clowder ENV
  name: ENV_NAME
  required: true
- description: Image
  name: IMAGE
  value: quay.io/redhat-user-workloads/hcc-integrations-tenant/sources/sources-mcp
- description: Image tag
  name: IMAGE_TAG
  required: true
- name: LOG_LEVEL
  value: INFO
- name: CPU_LIMIT
  value: 200m
- name: CPU_REQUEST
  value: 50m
- name: MEMORY_LIMIT
  value: 256Mi
- name: MEMORY_REQUEST
  value: 64Mi
- description: The number of replicas to use for the MCP service
  name: MIN_REPLICAS
  value: '1'
